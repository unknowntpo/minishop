global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - benchmark-prometheus:9090

  - job_name: worker-seckill
    metrics_path: /metrics
    static_configs:
      - targets:
          - benchmark-worker-seckill:9404

  - job_name: go-backend
    metrics_path: /metrics
    dns_sd_configs:
      - names:
          - tasks.benchmark-go-backend
        type: A
        port: 3000
