services:
  postgres:
    image: postgres:17
    container_name: minishop-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: minishop
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "${MINISHOP_POSTGRES_PORT:-5433}:5432"
    volumes:
      - minishop_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d minishop"]
      interval: 5s
      timeout: 5s
      retries: 10

  nats:
    image: nats:2.11
    container_name: minishop-nats
    restart: unless-stopped
    command: ["-js", "-sd", "/data", "-m", "8222"]
    ports:
      - "${MINISHOP_NATS_PORT:-4222}:4222"
      - "${MINISHOP_NATS_MONITOR_PORT:-8222}:8222"
    volumes:
      - minishop_nats_data:/data

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.18
    container_name: minishop-redpanda
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "1G"
      - --reserve-memory
      - "0M"
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092,OUTSIDE://localhost:19092
    ports:
      - "${MINISHOP_KAFKA_PORT:-19092}:19092"
      - "${MINISHOP_REDPANDA_METRICS_PORT:-9644}:9644"

  tempo:
    image: grafana/tempo:2.8.2
    container_name: minishop-tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./observability/tempo.yaml:/etc/tempo.yaml:ro
      - minishop_tempo_data:/var/tempo
    ports:
      - "${MINISHOP_TEMPO_PORT:-3200}:3200"
      - "${MINISHOP_TEMPO_OTLP_HTTP_PORT:-4318}:4318"

  prometheus:
    image: prom/prometheus:v3.5.0
    container_name: minishop-prometheus
    restart: unless-stopped
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "${MINISHOP_PROMETHEUS_PORT:-9090}:9090"

  grafana:
    image: grafana/grafana:12.1.1
    container_name: minishop-grafana
    restart: unless-stopped
    depends_on:
      tempo:
        condition: service_started
      prometheus:
        condition: service_started
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "${MINISHOP_GRAFANA_PORT:-3002}:3000"

  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
      redpanda:
        condition: service_started
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/minishop
      DATABASE_POOL_MAX: ${APP_DATABASE_POOL_MAX:-16}
      NATS_URL: nats://nats:4222
      NATS_BUY_INTENT_STREAM: ${NATS_BUY_INTENT_STREAM:-BUY_INTENT_COMMANDS}
      NATS_BUY_INTENT_SUBJECT: ${NATS_BUY_INTENT_SUBJECT:-buy-intent.command}
      NATS_BUY_INTENT_RETRY_SUBJECT: ${NATS_BUY_INTENT_RETRY_SUBJECT:-buy-intent.retry}
      NATS_BUY_INTENT_DLQ_SUBJECT: ${NATS_BUY_INTENT_DLQ_SUBJECT:-buy-intent.dlq}
      NATS_BUY_INTENT_DURABLE_CONSUMER: ${NATS_BUY_INTENT_DURABLE_CONSUMER:-buy-intent-ingest}
      NATS_BUY_INTENT_INGEST_BATCH_SIZE: ${NATS_BUY_INTENT_INGEST_BATCH_SIZE:-500}
      NATS_BUY_INTENT_INGEST_EXPIRES_MS: ${NATS_BUY_INTENT_INGEST_EXPIRES_MS:-25}
      NATS_BUY_INTENT_INGEST_RETRY_DELAY_MS: ${NATS_BUY_INTENT_INGEST_RETRY_DELAY_MS:-1000}
      NATS_BUY_INTENT_ACK_WAIT_MS: ${NATS_BUY_INTENT_ACK_WAIT_MS:-30000}
      NATS_BUY_INTENT_INGEST_CONTINUOUS: ${NATS_BUY_INTENT_INGEST_CONTINUOUS:-0}
      KAFKA_BROKERS: ${KAFKA_BROKERS:-redpanda:9092}
      KAFKA_CLIENT_ID: ${KAFKA_CLIENT_ID:-minishop-app}
      KAFKA_SECKILL_REQUEST_TOPIC: ${KAFKA_SECKILL_REQUEST_TOPIC:-inventory.seckill.requested}
      KAFKA_SECKILL_RESULT_TOPIC: ${KAFKA_SECKILL_RESULT_TOPIC:-inventory.seckill.result}
      KAFKA_SECKILL_DLQ_TOPIC: ${KAFKA_SECKILL_DLQ_TOPIC:-inventory.seckill.dlq}
      KAFKA_SECKILL_BUCKET_COUNT: ${KAFKA_SECKILL_BUCKET_COUNT:-16}
      KAFKA_SECKILL_MAX_PROBE: ${KAFKA_SECKILL_MAX_PROBE:-4}
      KAFKA_SECKILL_CONFIG_CACHE_TTL_MS: ${KAFKA_SECKILL_CONFIG_CACHE_TTL_MS:-60000}
      KAFKA_SECKILL_PUBLISH_BATCH_SIZE: ${KAFKA_SECKILL_PUBLISH_BATCH_SIZE:-64}
      KAFKA_SECKILL_PUBLISH_LINGER_MS: ${KAFKA_SECKILL_PUBLISH_LINGER_MS:-2}
      KAFKA_SECKILL_CLIENT_LINGER_MS: ${KAFKA_SECKILL_CLIENT_LINGER_MS:-1}
      KAFKA_SECKILL_CLIENT_BATCH_NUM_MESSAGES: ${KAFKA_SECKILL_CLIENT_BATCH_NUM_MESSAGES:-10000}
      BUY_INTENT_BATCH_SIZE: ${BUY_INTENT_BATCH_SIZE:-100}
      BUY_INTENT_PROCESS_POLL_INTERVAL_MS: ${BUY_INTENT_PROCESS_POLL_INTERVAL_MS:-1000}
      OTEL_ENABLED: ${OTEL_ENABLED:-1}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://tempo:4318}
      OTEL_SERVICE_NAME: minishop-app
      NODE_OPTIONS: ${NODE_OPTIONS:---require=/app/instrumentation.node.cjs}
      NEXT_TELEMETRY_DISABLED: "1"
    expose:
      - "3000"

  app-lb:
    image: nginx:1.27-alpine
    container_name: minishop-app-lb
    restart: unless-stopped
    depends_on:
      - app
    volumes:
      - ./ops/nginx/app-lb.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${MINISHOP_APP_PORT:-3001}:3000"

  go-seckill-ingress:
    build:
      context: .
      dockerfile: Dockerfile.go-seckill-ingress
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_started
      tempo:
        condition: service_started
    environment:
      GO_SECKILL_INGRESS_ADDR: :3000
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/minishop
      DATABASE_POOL_MAX: ${GO_SECKILL_INGRESS_DATABASE_POOL_MAX:-4}
      KAFKA_BROKERS: ${KAFKA_BROKERS:-redpanda:9092}
      KAFKA_CLIENT_ID: ${GO_SECKILL_INGRESS_KAFKA_CLIENT_ID:-minishop-go-seckill-ingress}
      KAFKA_SECKILL_REQUEST_TOPIC: ${KAFKA_SECKILL_REQUEST_TOPIC:-inventory.seckill.requested}
      KAFKA_SECKILL_BUCKET_COUNT: ${KAFKA_SECKILL_BUCKET_COUNT:-16}
      KAFKA_SECKILL_MAX_PROBE: ${KAFKA_SECKILL_MAX_PROBE:-4}
      KAFKA_SECKILL_CONFIG_CACHE_TTL_MS: ${KAFKA_SECKILL_CONFIG_CACHE_TTL_MS:-60000}
      KAFKA_SECKILL_CLIENT_LINGER_MS: ${KAFKA_SECKILL_CLIENT_LINGER_MS:-1}
      KAFKA_SECKILL_CLIENT_BATCH_NUM_MESSAGES: ${KAFKA_SECKILL_CLIENT_BATCH_NUM_MESSAGES:-10000}
      KAFKA_SECKILL_CLIENT_COMPRESSION: ${KAFKA_SECKILL_CLIENT_COMPRESSION:-none}
      OTEL_ENABLED: ${OTEL_ENABLED:-1}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://tempo:4318}
      OTEL_SERVICE_NAME: ${GO_SECKILL_INGRESS_OTEL_SERVICE_NAME:-go-seckill-ingress}
    expose:
      - "3000"

  go-seckill-ingress-lb:
    image: nginx:1.27-alpine
    container_name: minishop-go-seckill-ingress-lb
    restart: unless-stopped
    depends_on:
      - go-seckill-ingress
    volumes:
      - ./ops/nginx/go-seckill-ingress-lb.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${MINISHOP_GO_SECKILL_INGRESS_PORT:-3004}:3000"

  worker-buy-intents-ingest:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: minishop-worker-buy-intents-ingest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/minishop
      DATABASE_POOL_MAX: ${INGEST_DATABASE_POOL_MAX:-8}
      NATS_URL: nats://nats:4222
      NATS_BUY_INTENT_STREAM: ${NATS_BUY_INTENT_STREAM:-BUY_INTENT_COMMANDS}
      NATS_BUY_INTENT_SUBJECT: ${NATS_BUY_INTENT_SUBJECT:-buy-intent.command}
      NATS_BUY_INTENT_RETRY_SUBJECT: ${NATS_BUY_INTENT_RETRY_SUBJECT:-buy-intent.retry}
      NATS_BUY_INTENT_DLQ_SUBJECT: ${NATS_BUY_INTENT_DLQ_SUBJECT:-buy-intent.dlq}
      NATS_BUY_INTENT_DURABLE_CONSUMER: ${NATS_BUY_INTENT_DURABLE_CONSUMER:-buy-intent-ingest}
      NATS_BUY_INTENT_INGEST_BATCH_SIZE: ${NATS_BUY_INTENT_INGEST_BATCH_SIZE:-500}
      NATS_BUY_INTENT_INGEST_EXPIRES_MS: ${NATS_BUY_INTENT_INGEST_EXPIRES_MS:-25}
      NATS_BUY_INTENT_INGEST_RETRY_DELAY_MS: ${NATS_BUY_INTENT_INGEST_RETRY_DELAY_MS:-1000}
      NATS_BUY_INTENT_ACK_WAIT_MS: ${NATS_BUY_INTENT_ACK_WAIT_MS:-30000}
      NATS_BUY_INTENT_INGEST_CONTINUOUS: ${NATS_BUY_INTENT_INGEST_CONTINUOUS:-1}
      OTEL_ENABLED: ${OTEL_ENABLED:-1}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://tempo:4318}
      OTEL_SERVICE_NAME: worker-buy-intents-ingest
      NODE_OPTIONS: ${NODE_OPTIONS:---require=/app/instrumentation.node.cjs}
      NEXT_TELEMETRY_DISABLED: "1"
    command: ["pnpm", "worker:buy-intents:ingest:nats"]

  worker-staged-buy-intents-process:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: minishop-worker-staged-buy-intents-process
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/minishop
      DATABASE_POOL_MAX: ${BUY_INTENT_PROCESS_DATABASE_POOL_MAX:-32}
      BUY_INTENT_COMMAND_ORCHESTRATOR_MODE: ${BUY_INTENT_COMMAND_ORCHESTRATOR_MODE:-noop}
      BUY_INTENT_BATCH_SIZE: ${BUY_INTENT_PROCESS_BATCH_SIZE:-1000}
      BUY_INTENT_PROCESS_CONCURRENCY: ${BUY_INTENT_PROCESS_CONCURRENCY:-64}
      BUY_INTENT_PROCESS_POLL_INTERVAL_MS: ${BUY_INTENT_PROCESS_POLL_INTERVAL_MS:-10}
      OTEL_ENABLED: ${OTEL_ENABLED:-1}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://tempo:4318}
      OTEL_SERVICE_NAME: worker-staged-buy-intents-process
      NODE_OPTIONS: ${NODE_OPTIONS:---require=/app/instrumentation.node.cjs}
      NEXT_TELEMETRY_DISABLED: "1"
    command: ["pnpm", "worker:staged-buy-intents:process:loop"]

  worker-staged-buy-intents-process-2:
    profiles: ["benchmark"]
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: minishop-worker-staged-buy-intents-process-2
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/minishop
      DATABASE_POOL_MAX: ${BUY_INTENT_PROCESS_DATABASE_POOL_MAX:-32}
      BUY_INTENT_COMMAND_ORCHESTRATOR_MODE: ${BUY_INTENT_COMMAND_ORCHESTRATOR_MODE:-noop}
      BUY_INTENT_BATCH_SIZE: ${BUY_INTENT_PROCESS_BATCH_SIZE:-1000}
      BUY_INTENT_PROCESS_CONCURRENCY: ${BUY_INTENT_PROCESS_CONCURRENCY:-64}
      BUY_INTENT_PROCESS_POLL_INTERVAL_MS: ${BUY_INTENT_PROCESS_POLL_INTERVAL_MS:-10}
      OTEL_ENABLED: ${OTEL_ENABLED:-1}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://tempo:4318}
      OTEL_SERVICE_NAME: worker-staged-buy-intents-process
      NODE_OPTIONS: ${NODE_OPTIONS:---require=/app/instrumentation.node.cjs}
      NEXT_TELEMETRY_DISABLED: "1"
    command: ["pnpm", "worker:staged-buy-intents:process:loop"]

  worker-staged-buy-intents-process-3:
    profiles: ["benchmark"]
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: minishop-worker-staged-buy-intents-process-3
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/minishop
      DATABASE_POOL_MAX: ${BUY_INTENT_PROCESS_DATABASE_POOL_MAX:-32}
      BUY_INTENT_COMMAND_ORCHESTRATOR_MODE: ${BUY_INTENT_COMMAND_ORCHESTRATOR_MODE:-noop}
      BUY_INTENT_BATCH_SIZE: ${BUY_INTENT_PROCESS_BATCH_SIZE:-1000}
      BUY_INTENT_PROCESS_CONCURRENCY: ${BUY_INTENT_PROCESS_CONCURRENCY:-64}
      BUY_INTENT_PROCESS_POLL_INTERVAL_MS: ${BUY_INTENT_PROCESS_POLL_INTERVAL_MS:-10}
      OTEL_ENABLED: ${OTEL_ENABLED:-1}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://tempo:4318}
      OTEL_SERVICE_NAME: worker-staged-buy-intents-process
      NODE_OPTIONS: ${NODE_OPTIONS:---require=/app/instrumentation.node.cjs}
      NEXT_TELEMETRY_DISABLED: "1"
    command: ["pnpm", "worker:staged-buy-intents:process:loop"]

  worker-projections:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: minishop-worker-projections
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/minishop
      DATABASE_POOL_MAX: ${PROJECTION_DATABASE_POOL_MAX:-8}
      PROJECTION_NAME: ${PROJECTION_NAME:-main}
      PROJECTION_BATCH_SIZE: ${PROJECTION_BATCH_SIZE:-100}
      PROJECTION_POLL_INTERVAL_MS: ${PROJECTION_POLL_INTERVAL_MS:-1000}
      OTEL_ENABLED: ${OTEL_ENABLED:-1}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://tempo:4318}
      OTEL_SERVICE_NAME: worker-projections
      NODE_OPTIONS: ${NODE_OPTIONS:---require=/app/instrumentation.node.cjs}
      NEXT_TELEMETRY_DISABLED: "1"
    command: ["pnpm", "worker:projections"]

  worker-seckill:
    build:
      context: .
      dockerfile: Dockerfile.seckill-worker
    container_name: minishop-worker-seckill
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_started
    environment:
      JDBC_DATABASE_URL: jdbc:postgresql://postgres:5432/minishop
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      KAFKA_BROKERS: ${KAFKA_BROKERS:-redpanda:9092}
      KAFKA_SECKILL_APPLICATION_ID: ${KAFKA_SECKILL_APPLICATION_ID:-minishop-seckill-worker-v2}
      KAFKA_SECKILL_REQUEST_TOPIC: ${KAFKA_SECKILL_REQUEST_TOPIC:-inventory.seckill.requested}
      KAFKA_SECKILL_RESULT_TOPIC: ${KAFKA_SECKILL_RESULT_TOPIC:-inventory.seckill.result}
      KAFKA_SECKILL_DLQ_TOPIC: ${KAFKA_SECKILL_DLQ_TOPIC:-inventory.seckill.dlq}
      KAFKA_SECKILL_DESERIALIZATION_EXCEPTION_HANDLER: ${KAFKA_SECKILL_DESERIALIZATION_EXCEPTION_HANDLER:-org.apache.kafka.streams.errors.LogAndContinueExceptionHandler}
      KAFKA_SECKILL_PROCESSING_EXCEPTION_HANDLER: ${KAFKA_SECKILL_PROCESSING_EXCEPTION_HANDLER:-org.apache.kafka.streams.errors.LogAndContinueProcessingExceptionHandler}
      KAFKA_SECKILL_PRODUCTION_EXCEPTION_HANDLER: ${KAFKA_SECKILL_PRODUCTION_EXCEPTION_HANDLER:-org.apache.kafka.streams.errors.DefaultProductionExceptionHandler}
      KAFKA_SECKILL_STATE_DIR: /var/lib/minishop-seckill/state
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://tempo:4318}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-http/protobuf}
      OTEL_SERVICE_NAME: ${WORKER_SECKILL_OTEL_SERVICE_NAME:-worker-seckill}
      OTEL_TRACES_EXPORTER: ${WORKER_SECKILL_OTEL_TRACES_EXPORTER:-otlp}
      OTEL_METRICS_EXPORTER: ${WORKER_SECKILL_OTEL_METRICS_EXPORTER:-none}
      OTEL_LOGS_EXPORTER: ${WORKER_SECKILL_OTEL_LOGS_EXPORTER:-none}
      OTEL_PROPAGATORS: ${WORKER_SECKILL_OTEL_PROPAGATORS:-tracecontext,baggage}
      JAVA_TOOL_OPTIONS: ${WORKER_SECKILL_JAVA_TOOL_OPTIONS:--javaagent:/opt/otel/opentelemetry-javaagent.jar -javaagent:/opt/jmx/jmx_prometheus_javaagent.jar=9404:/etc/jmx-exporter/kafka-streams.yml}
    volumes:
      - minishop_seckill_state:/var/lib/minishop-seckill/state
    expose:
      - "9404"

  worker-seckill-result-sink:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: minishop-worker-seckill-result-sink
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_started
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/minishop
      DATABASE_POOL_MAX: ${SECKILL_RESULT_SINK_DATABASE_POOL_MAX:-8}
      KAFKA_BROKERS: ${KAFKA_BROKERS:-redpanda:9092}
      KAFKA_SECKILL_RESULT_TOPIC: ${KAFKA_SECKILL_RESULT_TOPIC:-inventory.seckill.result}
      KAFKA_SECKILL_RESULT_SINK_GROUP_ID: ${KAFKA_SECKILL_RESULT_SINK_GROUP_ID:-minishop-seckill-result-sink}
      KAFKA_SECKILL_RESULT_SINK_CLIENT_ID: ${KAFKA_SECKILL_RESULT_SINK_CLIENT_ID:-minishop-seckill-result-sink}
      KAFKA_SECKILL_RESULT_SINK_PARTITIONS_CONCURRENTLY: ${KAFKA_SECKILL_RESULT_SINK_PARTITIONS_CONCURRENTLY:-6}
      OTEL_ENABLED: ${OTEL_ENABLED:-1}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://tempo:4318}
      OTEL_SERVICE_NAME: worker-seckill-result-sink
      NODE_OPTIONS: ${NODE_OPTIONS:---require=/app/instrumentation.node.cjs}
      NEXT_TELEMETRY_DISABLED: "1"
    command: ["pnpm", "worker:seckill:result-sink"]

  go-seckill-result-sink:
    build:
      context: .
      dockerfile: Dockerfile.go-seckill-result-sink
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_started
      tempo:
        condition: service_started
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/minishop
      DATABASE_POOL_MAX: ${GO_SECKILL_RESULT_SINK_DATABASE_POOL_MAX:-8}
      KAFKA_BROKERS: ${KAFKA_BROKERS:-redpanda:9092}
      KAFKA_SECKILL_RESULT_TOPIC: ${KAFKA_SECKILL_RESULT_TOPIC:-inventory.seckill.result}
      KAFKA_SECKILL_RESULT_SINK_GROUP_ID: ${KAFKA_SECKILL_RESULT_SINK_GROUP_ID:-minishop-seckill-result-sink}
      KAFKA_SECKILL_RESULT_SINK_CLIENT_ID: ${GO_SECKILL_RESULT_SINK_CLIENT_ID:-minishop-go-seckill-result-sink}
      KAFKA_SECKILL_RESULT_SINK_PARTITIONS_CONCURRENTLY: ${KAFKA_SECKILL_RESULT_SINK_PARTITIONS_CONCURRENTLY:-6}
      GO_SECKILL_RESULT_SINK_MIN_BYTES: ${GO_SECKILL_RESULT_SINK_MIN_BYTES:-1}
      GO_SECKILL_RESULT_SINK_MAX_BYTES: ${GO_SECKILL_RESULT_SINK_MAX_BYTES:-10000000}
      GO_SECKILL_RESULT_SINK_MAX_WAIT_MS: ${GO_SECKILL_RESULT_SINK_MAX_WAIT_MS:-250}
      GO_SECKILL_RESULT_SINK_COMMIT_INTERVAL_MS: ${GO_SECKILL_RESULT_SINK_COMMIT_INTERVAL_MS:-0}
      OTEL_ENABLED: ${OTEL_ENABLED:-1}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://tempo:4318}
      OTEL_SERVICE_NAME: ${GO_SECKILL_RESULT_SINK_OTEL_SERVICE_NAME:-go-seckill-result-sink}

  benchmark-runner:
    profiles: ["benchmark"]
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: minishop-benchmark-runner
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
      redpanda:
        condition: service_started
      app:
        condition: service_started
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/minishop
      BENCHMARK_APP_URL: ${BENCHMARK_APP_URL:-http://app:3000}
      BENCHMARK_IN_CONTAINER: "1"
      BENCHMARK_KAFKA_CLIENT: confluent-kafka-javascript
      BENCHMARK_KAFKA_BROKERS: ${KAFKA_BROKERS:-redpanda:9092}
      BENCHMARK_KAFKA_SECKILL_REQUEST_TOPIC: ${KAFKA_SECKILL_REQUEST_TOPIC:-inventory.seckill.requested}
      BENCHMARK_KAFKA_SECKILL_RESULT_TOPIC: ${KAFKA_SECKILL_RESULT_TOPIC:-inventory.seckill.result}
      BENCHMARK_KAFKA_SECKILL_DLQ_TOPIC: ${KAFKA_SECKILL_DLQ_TOPIC:-inventory.seckill.dlq}
      KAFKA_SECKILL_PUBLISH_BATCH_SIZE: ${KAFKA_SECKILL_PUBLISH_BATCH_SIZE:-64}
      KAFKA_SECKILL_PUBLISH_LINGER_MS: ${KAFKA_SECKILL_PUBLISH_LINGER_MS:-2}
