services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: minishop
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d minishop"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "${MINISHOP_POSTGRES_PORT:-55433}:5432"
    volumes:
      - frontend_go_e2e_postgres:/var/lib/postgresql/data

  nats:
    image: nats:2.11
    command: ["-js", "-sd", "/data", "-m", "8222"]
    volumes:
      - frontend_go_e2e_nats:/data

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.2.18
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "1G"
      - --reserve-memory
      - "0M"
      - --node-id
      - "0"
      - --check=false
      - --set
      - redpanda.auto_create_topics_enabled=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092

  go-backend:
    build:
      context: .
      dockerfile: Dockerfile.go-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
      redpanda:
        condition: service_started
    environment:
      GO_BACKEND_ADDR: :3000
      GO_BACKEND_HTTP_ENGINE: nethttp
      GO_BACKEND_CORS_ALLOWED_ORIGINS: ${GO_BACKEND_CORS_ALLOWED_ORIGINS:-http://127.0.0.1:53001}
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/minishop
      DATABASE_POOL_MAX: 16
      NATS_URL: nats://nats:4222
      NATS_BUY_INTENT_STREAM: BUY_INTENT_COMMANDS
      NATS_BUY_INTENT_SUBJECT: buy-intent.command
      NATS_BUY_INTENT_RETRY_SUBJECT: buy-intent.retry
      NATS_BUY_INTENT_DLQ_SUBJECT: buy-intent.dlq
      KAFKA_BROKERS: redpanda:9092
      KAFKA_CLIENT_ID: minishop-go-backend-fe-e2e
      KAFKA_SECKILL_REQUEST_TOPIC: inventory.seckill.requested
      KAFKA_SECKILL_RESULT_TOPIC: inventory.seckill.result
      KAFKA_SECKILL_DLQ_TOPIC: inventory.seckill.dlq
      KAFKA_SECKILL_BUCKET_COUNT: 4
      KAFKA_SECKILL_REQUEST_TOPIC_PARTITIONS: 4
      KAFKA_SECKILL_RESULT_TOPIC_PARTITIONS: 4
      KAFKA_SECKILL_DLQ_TOPIC_PARTITIONS: 4
      KAFKA_SECKILL_MAX_PROBE: 4
      KAFKA_SECKILL_CONFIG_CACHE_TTL_MS: 0
      KAFKA_SECKILL_CLIENT_LINGER_MS: 50
      KAFKA_SECKILL_CLIENT_BATCH_NUM_MESSAGES: 5000
      KAFKA_SECKILL_CLIENT_COMPRESSION: none
      OTEL_ENABLED: "0"
      NEXT_TELEMETRY_DISABLED: "1"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/healthz >/dev/null"]
      interval: 3s
      timeout: 3s
      retries: 20
    ports:
      - "${MINISHOP_GO_BACKEND_PORT:-53005}:3000"

  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
      redpanda:
        condition: service_started
      go-backend:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/minishop
      DATABASE_POOL_MAX: 16
      NATS_URL: nats://nats:4222
      NATS_BUY_INTENT_STREAM: BUY_INTENT_COMMANDS
      NATS_BUY_INTENT_SUBJECT: buy-intent.command
      NATS_BUY_INTENT_RETRY_SUBJECT: buy-intent.retry
      NATS_BUY_INTENT_DLQ_SUBJECT: buy-intent.dlq
      NATS_BUY_INTENT_DURABLE_CONSUMER: buy-intent-ingest
      NATS_BUY_INTENT_INGEST_BATCH_SIZE: 500
      NATS_BUY_INTENT_INGEST_EXPIRES_MS: 25
      NATS_BUY_INTENT_INGEST_RETRY_DELAY_MS: 1000
      NATS_BUY_INTENT_ACK_WAIT_MS: 30000
      NATS_BUY_INTENT_INGEST_CONTINUOUS: "0"
      KAFKA_BROKERS: redpanda:9092
      KAFKA_CLIENT_ID: minishop-app
      KAFKA_SECKILL_REQUEST_TOPIC: inventory.seckill.requested
      KAFKA_SECKILL_RESULT_TOPIC: inventory.seckill.result
      KAFKA_SECKILL_DLQ_TOPIC: inventory.seckill.dlq
      KAFKA_SECKILL_BUCKET_COUNT: 4
      KAFKA_SECKILL_REQUEST_TOPIC_PARTITIONS: 4
      KAFKA_SECKILL_RESULT_TOPIC_PARTITIONS: 4
      KAFKA_SECKILL_DLQ_TOPIC_PARTITIONS: 4
      KAFKA_SECKILL_MAX_PROBE: 4
      KAFKA_SECKILL_CONFIG_CACHE_TTL_MS: 60000
      GO_SECKILL_INGRESS_PROXY_ENABLED: "0"
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://127.0.0.1:53005}
      OTEL_ENABLED: "0"
      NEXT_TELEMETRY_DISABLED: "1"
    expose:
      - "3000"

  app-lb:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - app
    volumes:
      - ./ops/nginx/app-lb.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${MINISHOP_APP_PORT:-53001}:3000"

  worker-buy-intents-ingest:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_started
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/minishop
      DATABASE_POOL_MAX: 8
      NATS_URL: nats://nats:4222
      NATS_BUY_INTENT_STREAM: BUY_INTENT_COMMANDS
      NATS_BUY_INTENT_SUBJECT: buy-intent.command
      NATS_BUY_INTENT_RETRY_SUBJECT: buy-intent.retry
      NATS_BUY_INTENT_DLQ_SUBJECT: buy-intent.dlq
      NATS_BUY_INTENT_DURABLE_CONSUMER: buy-intent-ingest
      NATS_BUY_INTENT_INGEST_BATCH_SIZE: 100
      NATS_BUY_INTENT_INGEST_EXPIRES_MS: 25
      NATS_BUY_INTENT_INGEST_RETRY_DELAY_MS: 1000
      NATS_BUY_INTENT_ACK_WAIT_MS: 30000
      NATS_BUY_INTENT_INGEST_CONTINUOUS: "1"
      OTEL_ENABLED: "0"
      NEXT_TELEMETRY_DISABLED: "1"
    command: ["pnpm", "worker:buy-intents:ingest:nats"]

  worker-staged-buy-intents-process:
    build:
      context: .
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/minishop
      DATABASE_POOL_MAX: 16
      BUY_INTENT_COMMAND_ORCHESTRATOR_MODE: noop
      BUY_INTENT_BATCH_SIZE: 100
      BUY_INTENT_PROCESS_CONCURRENCY: 16
      BUY_INTENT_PROCESS_POLL_INTERVAL_MS: 10
      OTEL_ENABLED: "0"
      NEXT_TELEMETRY_DISABLED: "1"
    command: ["pnpm", "worker:staged-buy-intents:process:loop"]

volumes:
  frontend_go_e2e_postgres:
  frontend_go_e2e_nats:
